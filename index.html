        b(c5, "ताकाहाशिसान एक जगह गाड़ी रुकवा कर हमें एक सँकरी, पथरीली ढलान पर ले चलते हैं। यहाँ जलप्रपात है-मिनो फॉल्ज़ | रवीन्द्र और अजय गुप्ता कुछ क़दम चल कर ताड़ जाते हैं कि दुर्गम मार्ग है। वे दोनों चुपके से वापस जाकर गाड़ी में बैठ जाते हैं, बाकी सब उत्साह में आगे बढ़ते जाते हैं। घने पेड़ों की हरी, गुलाबी, पीली, नारंगी पत्तियों से झलक मारता झरना अपने कलकल निनाद से हमें बुलावा दे रहा है। मौसम एकदम आशिक़ाना है। राह में विस्मयकारी मोड़ हैं।", "Takahashisan ek jagah gaadi rukwa kar hamein ek sankari, pathreeli dhalaan par le chalte hain. Yahan jalprapat hai-Mino Falls. Ravindra aur Ajay Gupta kuch qadam chal kar taad jaate hain ki durgam maarg hai. Ve donon chupke se waapas jaakar gaadi mein baith jaate hain, baaki sab utsaah mein aage badhte jaate hain. Ghane pedon ki hari, gulabi, peeli, narangi pattiyon se jhalak maarta jharna apne kalkal ninaad se hamein bulawa de raha hai. Mausam ekdam aashiqana hai. Raah mein vismayakaari mod hain.");
        b(c5, "ऋचा मिश्र और मैं जगह-जगह ठगे से खड़े हो जाते हैं, चारों ओर का दृश्य इतना मनोरम है कि इसके लिए अपनी आँख का लेंस और कैमरे का फोकस दोनों नाकाफ़ी लग रहा है । झरना जहाँ गिरता है, वहाँ चौसर भूमि पर नन्हा सा बाज़ार है, पहाड़ी हाट जैसा | एक जगह एक स्त्री मोमिजी की पत्तियों को आटे के घोल में लपेट कर मीठा व्यंजन बना रही है। ताकाहाशिसान हम सबके लिए मिष्ठान्न खरीदते हैं।", "Richa Mishra aur main jagah-jagah thage se khade ho jaate hain, chaaron or ka drishya itna manoram hai ki iske liye apni aankh ka lens aur camera ka focus donon nakaafi lag raha hai. Jharna jahan girta hai, wahan chausar bhoomi par nanha sa baazaar hai, pahadi haat jaisa. Ek jagah ek stree Momiji ki pattiyon ko aate ke ghol mein lapet kar meetha vyanjan bana rahi hai. Takahashisan hum sabke liye mishthaann khareedte hain.");
        b(c5, "रेल से' नारा' पहुँचने में बहुत वक़्त नहीं लगा। पूर्व की प्राचीन संस्कृति और कला का केन्द्र नारा, तुर्की, चीन और भारत की विशेषताएँ अपने स्थापत्य और प्रतिमाओं में सँजोये हुए हैं। यहाँ हर मूर्ति के पीछे कोई आख्यान है। बौद्ध अभिलेखों के प्रतीकात्मक अर्थ हैं। यहाँ का प्रसिद्ध मन्दिर है तोदायजी, जिसकी स्थापना ७४३ में हुई । इस मन्दिर के अधिष्ठाता गौतम बुद्ध हैं जिन्हें जापानी में दायबुत्सु कहते हैं।", "Rail se 'Nara' pahunchne mein bahut waqt nahi laga. Poorv ki pracheen sanskriti aur kala ka kendra Nara, Turki, Cheen aur Bharat ki visheshtayein apne sthaapatya aur pratimaon mein sanjoye hue hain. Yahan har moorti ke peechhe koi aakhyan hai. Bauddh abhilekhon ke prateekatmak arth hain. Yahan ka prasiddh mandir hai Todai-ji, jiski sthapna 743 mein hui. Is mandir ke adhishthata Gautam Buddha hain jinhein japani mein Daibutsu kehte hain.");
        b(c5, "विशाल परिसर में काली भूरी लकड़ी का महाकाय स्थापत्य देख कर विस्मय होता है कि बिना सीमेंट और पत्थर के, लकड़ी का यह भवन कैसे टिका हुआ है । सैकड़ों मौसमों की मार खा कर यहाँ के काष्ठस्तम्भ सँवला गये हैं, किन्तु जर्जर नहीं हैं। बड़े से आँगन के बीचोंबीच एक गोलाकार वृत्त में आग जलती रहती है। यह दिव्य ज्योति है, ऐसी मान्यता है। बिल्कुल भारतीय शैली में श्रद्धालु यहाँ आकर ज्योति की आरती अपने माथे पर लगाते हैं। यहाँ दानपात्र लगा हुआ है किन्तु दान देने की बाध्यता नहीं है।", "Vishaal parisar mein kaali bhoori lakdi ka mahakaay sthaapatya dekh kar vismaya hota hai ki bina cement aur patthar ke, lakdi ka yeh bhavan kaise tika hua hai. Saikadon mausamon ki maar kha kar yahan ke kashthstambh sanvla gaye hain, kintu jarjar nahi hain. Bade se aangan ke beechobeech ek golaakaar vritt mein aag jalti rehti hai. Yeh divya jyoti hai, aisi maanyata hai. Bilkul bhartiya shaili mein shraddhalu yahan aakar jyoti ki aarti apne maathe par lagate hain. Yahan daanpatra laga hua hai kintu daan dene ki baadhyata nahi hai.");
        b(c5, "तोदायजी के प्रवेश द्वार के दोनों तरफ़ दो प्रहरी- प्रतिमाएँ हैं, एक का मुँह खुला है, दूसरी का बन्द है । ये ओ आर ओम के उच्चार का संकेत करती हैं जिनसे मिल कर ओम् बनता है । मन्दिर के गर्भगृह में गौतम बुद्ध की ५५ फुट ऊँची कांस्यप्रतिमा है जिसका वज़न ५०० टन है। इस गर्भगृह को 'दायुबुत्सु-देन' कहा जाता है। यहाँ की आन्तरिक साज-सज्जा कई बार आग लगने से स्वाहा हुई, परन्तु हर बार उसका पुनर्निर्माण करवा दिया गया। अब भी इसमें मध्ययुगीन वैभव की झलक मिलती है।", "Todai-ji ke pravesh dwar ke donon taraf do prahari- pratimayein hain, ek ka munh khula hai, doosri ka band hai. Ye O aur Om ke uchchaar ka sanket karti hain jinse mil kar Om banta hai. Mandir ke garbhagriha mein Gautam Buddha ki 55 fut oonchi kansyapratima hai jiska vazan 500 ton hai. Is garbhagriha ko 'Daibutsu-den' kaha jaata hai. Yahan ki aantarik saaj-sajja kai baar aag lagne se swaha hui, parantu har baar uska punarnirman karwa diya gaya. Ab bhi ismein madhyayugeen vaibhav ki jhalak milti hai.");
        b(c5, "तोदायजी में बौद्ध प्रतिमा के नीचे एक छोटा-सा मार्ग है, इतना सँकरा कि एक अकेले व्यक्ति का भी उसमें से निकलना असम्भव लगे । प्रचलित मान्यता है कि जो इसमें से पार निकल जाए, उसे मोक्ष प्राप्त हो जाता है। हम सबके मना करते-करते भी हरजेन्द्र चौधरी उसे पार कर जाते हैं। तोदायजी के बरामदे में एक अन्य मूर्ति की स्थापना है। इसका नाम जापानी और हिन्दुस्तानी से मिल कर बना है-भारद्वाज | बुद्ध की ही मुद्रा में बैठे इस देवता की महिमा यह बताई जाती है कि इसके स्पर्श में आरोग्य-शक्ति है । अगर इसका मस्तक छू लें तो आपका सिरदर्द ठीक हो जाएगा। अगर इसके पाँव छू लें तो पाँवों का दर्द छूमन्तर हो जाएगा | मैं देर तक भारद्वाज देव का घुटना छूती हूँ कि मेरे घुटनों का दर्द ठीक हो जाय । कुछ नहीं होता मनोरंजन के सिवाय ।", "Todai-ji mein bauddh pratima ke neeche ek chhota-sa maarg hai, itna sankara ki ek akele vyakti ka bhi usmein se nikalna asambhav lage. Prachalit maanyata hai ki jo ismein se paar nikal jaye, use moksha praapt ho jaata hai. Hum sabke mana karte-karte bhi Harjendra Chaudhary use paar kar jaate hain. Todai-ji ke baramde mein ek anya moorti ki sthapna hai. Iska naam japani aur hindustani se mil kar bana hai-Bhardwaj. Buddha ki hi mudra mein baithe is devta ki mahima yeh batayi jaati hai ki iske sparsh mein aarogya-shakti hai. Agar iska mastak chhoo lein to aapka sirdard theek ho jayega. Agar iske paanv chhoo lein to paanvon ka dard chhoomantar ho jayega. Main der tak Bhardwaj dev ka ghutna chhooti hoon ki mere ghutnon ka dard theek ho jaay. Kuch nahi hota manoranjan ke sivaay.");
        b(c5, "मन्दिर से जुड़ा विस्तृत बाज़ार है, जहाँ विविध सामान बिक रहा है । हमें कुछ नहीं चाहिए, फिर भी हम कुछ स्मृति चिह्न खरीद लेते हैं । यहाँ घूम कर चीनी और जापानी वस्तुओं का अन्तर समझ आ रहा है । हस्तशिल्प की जो बारीकी और नज़ाकत जापान में है, वह चीन में कहाँ, हाँ चीनी वस्तुएँ सस्ती और सर्वसुलभ ज़रूर हैं।", "Mandir se juda vistrit baazaar hai, jahan vividh saaman bik raha hai. Hamein kuch nahi chahiye, phir bhi hum kuch smriti chinh khareed lete hain. Yahan ghoom kar chini aur japani vastuon ka antar samajh aa raha hai. Hastshilp ki jo baareeki aur nazaakat Japan mein hai, vah Cheen mein kahan, haan chini vastuein sasti aur sarvasulabh zaroor hain.");
        b(c5, "तोदायजी से जुड़ा एक हिरन-वन है, जहाँ हम टहलते हुए पहुँच जाते हैं। मन्दिर से हिरन वन का रास्ता रंगबिरंगी पत्तियों से बिछा हुआ है। पथ लम्बा है पर खूबसूरत | अजय गुप्ता और रवीन्द्र अपने जैकेट की जेबें पत्तियों से भर लेते हैं। हिरन वन की बेंच पर बैठ वे अपनी सम्पदा निकाल कर देखते हैं।\n\n\" यहाँ तो पूरा पत्ती-सम्प्रदाय है ।\"\n\nरवीन्द्र इस सम्प्रदाय के पत्ती-गुरु घोषित हो जाते हैं। यह चुहल रास्ते भर चलती है, इसमें श्लेष और उत्प्रेक्षा मिलाई जा रही है।", "Todai-ji se juda ek hiran-van hai, jahan hum tahalte hue pahunch jaate hain. Mandir se hiran van ka raasta rangbirangi pattiyon se bichha hua hai. Path lamba hai par khoobsurat. Ajay Gupta aur Ravindra apne jacket ki jebein pattiyon se bhar lete hain. Hiran van ki bench par baith ve apni sampada nikaal kar dekhte hain.\n\n\"Yahan to poora patti-sampradaay hai.\"\n\nRavindra is sampradaay ke patti-guru ghoshit ho jaate hain. Yeh chuhal raaste bhar chalti hai, ismein shlesh aur utpreksha milayi jaa rahi hai.");
        b(c5, "हिरन-वन में हिरन, भारतीय हिरनों की तुलना में ज्यादा हृष्ट-पुष्ट हैं, दूर से देखने पर तगड़े बछड़ों की तरह हैं। क्यों न हों। वन में जगह-जगह, आटे के बिस्किटों का पैकेट मिलता है १५० येन में जो लोग खरीद कर हिरनों को खिलाते रहते हैं। वे अपनी सुडौल ग्रीवा उन्नत कर बिस्किट मुँह में लपक लेते हैं। ताकाहाशिसान बिस्किट की जगह हिरनों को केले खिला रहे हैं। एक-एक कर वे कई केले खिला डालते हैं, यहाँ तक कि अपना हिस्सा भी |", "Hiran-van mein hiran, bhartiya hiranon ki tulna mein zyada hrisht-pusht hain, door se dekhne par tagde bachhadon ki tarah hain. Kyon na hon. Van mein jagah-jagah, aate ke biskiton ka packet milta hai 150 Yen mein jo log khareed kar hiranon ko khilate rehte hain. Ve apni sudaul greeva unnat kar biskit munh mein lapak lete hain. Takahashisan biskit ki jagah hiranon ko kele khila rahe hain. Ek-ek kar ve kai kele khila daalte hain, yahan tak ki apna hissa bhi.");
        b(c5, "ताकाहाशिसान स्वयं कुछ नहीं खाते, हमें खिलाते हैं और हिरनों को भी । हमारे आसपास मँडराते हिरनों का हौसला इतना बुलन्द है कि एक हिरन मेरे हाथ से अधखाया केला छीन कर खा जाता है | जिस हरी-भरी पहाड़ी पर हम बैठे हैं, वहाँ से नारा का विहंगम दृश्य दिख रहा है। मैं यही सोच रही हूँ, इतने सुन्दर देश और संवेदनशील मित्रों को हम सायोनारा कैसे कहेंगे।", "Takahashisan swayam kuch nahi khaate, hamein khilate hain aur hiranon ko bhi. Hamare aaspaas mandrate hiranon ka hausla itna buland hai ki ek hiran mere haath se adhkhaya kela chheen kar kha jaata hai. Jis hari-bhari pahadi par hum baithe hain, wahan se Nara ka vihangam drishya dikh raha hai. Main yahi soch rahi hoon, itne sundar desh aur samvedansheel mitron ko hum sayonara kaise kahenge.");
        b(c5, "एक ज़माने में नारा जापान की राजधानी हुआ करता था । बुद्धधर्म के प्रसार से पहले यहाँ यूनानी, तुर्की और चीनी सभ्यताओं के प्राचीन स्वरूप व स्थापत्य विद्यमान थे | उनकी झलक आज भी यहाँ की कलाकृतियों, हस्तशिल्प और जीवनशैली में मिल जाती है। बौद्ध मन्दिरों में भारतीय विचारधारा एवं आकृतियाँ हैं। किन्तु अन्धविश्वास नहीं है। रात में हम ओसाका की १०० येन वाली दुकान पर जाकर खरीददारी करते हैं।", "Ek zamaane mein Nara Japan ki rajdhani hua karta tha. Bauddh-dharm ke prasaar se pehle yahan Yunani, Turki aur Chini sabhyataon ke pracheen swaroop va sthaapatya vidyamaan the. Unki jhalak aaj bhi yahan ki kalakritiyon, hastshilp aur jeevanshaili mein mil jaati hai. Bauddh mandiron mein bhartiya vichardhara evam aakritiyan hain. Kintu andhvishwas nahi hai. Raat mein hum Osaka ki 100 Yen wali dukaan par jaakar khareeddari karte hain.");
        b(c5, "मुझे एक नन्हा-सा सदाबहार पौधा पसन्द आता है और एक पर्स | मैं दोनों चीजें खरीद लेती हूँ। सामान बाँधते हुए पता चलता है कि पौधा ले जाने की हवाई जहाज़ में मनाही है। दुख होता है। पौधा गुमसुम नन्हे-मुन्ने बच्चे की तरह खिड़की पर रखा हुआ है। एक मित्र कहते हैं \" ऐसा करो काग़ज़ में लपेट कर अटैची में एक तरफ़ रख दो, इनडोर प्लांट है आठ-दस घंटे जीवित रह जाएगा ।\"", "Mujhe ek nanha-sa sadabahaar paudha pasand aata hai aur ek purse. Main donon cheezein khareed leti hoon. Saaman baandhte hue pata chalta hai ki paudha le jaane ki hawai jahaaz mein manaahi hai. Dukh hota hai. Paudha gumsum nanhe-munne bachche ki tarah khidki par rakha hua hai. Ek mitra kehte hain \"Aisa karo kaaghaz mein lapet kar ataichi mein ek taraf rakh do, indoor plant hai aath-das ghante jeevit rah jayega.\"");
        b(c5, "मैं ऐसा ही करती हूँ। सामान कार्गो में पहुँच जाता है। घर पहुँच कर सबसे पहले मैं अपना पौधा निकाल कर देखती हूँ। वह जिउतिया पौधा है— जीवन शक्ति से भरपूर । वह अभी भी हरा-भरा है, जापान की यादों की तरह ।", "Main aisa hi karti hoon. Saaman cargo mein pahunch jaata hai. Ghar pahunch kar sabse pehle main apna paudha nikaal kar dekhti hoon. Vah jutiya paudha hai— jeevan shakti se bharpoor. Vah abhi bhi hara-bhara hai, Japan ki yaadon ki tarah.");
        b(c5, "कठिन शब्दार्थ :\nयदा-कदा = कभी-कभी\nतकनीकी = Technology\nकर्मठ = कर्मनिष्ठ\nपथ-प्रदर्शक = रास्ता दिखानेवाला\nधरातल = धरती\nधकापेल = धक्कम-धक्का\nशुमार = गणना\nबहुतायत = अधिकता\nजिज्ञासा = जानने की इच्छा\nजमावड़ा = भीड़\nफक्कड = लापरवाह एवं निश्चिंत व्यक्ति\nऔघड़ = मनमौजी\nअदद = संख्या\nफिसल पट्टी = Elevator\nपलक झपकना = बहुत थोड़े ही समय में\n\nमुहावरा : मक्खी मारना = बेकार बैठना", "Kathin Shabdarth :\nYada-kada = Kabhi-kabhi\nTakneeki = Technology\nKarmath = Karmanishth\nPath-pradarshak = Raasta dikhanewala\nDharatal = Dharti\nDhakapel = Dhakkam-dhakka\nShumaar = Ganana\nBahutayat = Adhikta\nJigyasa = Jaan-ne ki ichchha\nJamavda = Bheed\nFakkad = Laparvah evam nishchint vyakti\nAughad = Manmauji\nAdad = Sankhya\nPhisal patti = Elevator\nPalak jhapakna = Bahut thode hi samay mein\n\nMuhavara : Makkhi maarna = Bekar baithna");

        // ==========================================
        // CHAPTER 6
        // ==========================================
        let c6 = addChap("सोना : महादेवी वर्मा", "Sona: Mahadevi Varma");
        b(c6, "सोना : महादेवी वर्मा", "Sona : Mahadevi Varma");
        b(c6, "सोना की आज अचानक स्मृति हो आने का कारण है। मेरे परिचित स्वर्गीय डाक्टर धीरेन्द्र नाथ वसु की पौत्री सस्मिता ने लिखा है :\n\n'गत वर्ष अपने पड़ोसी से मुझे एक हिरन मिला था। बीते कुछ महीनों में हम उससे बहुत स्नेह करने लगे हैं। परन्तु अब मैं अनुभव करती हूँ कि सघन जंगल से सम्बद्ध रहने के कारण तथा अब बड़े हो जाने के कारण उसे घूमने के लिए अधिक विस्तृत स्थान चाहिए।", "Sona ki aaj achanak smriti ho aane ka karan hai. Mere parichit swargiya Doctor Dhirendra Nath Basu ki pautri Sasmita ne likha hai :\n\n'Gat varsh apne padosi se mujhe ek hiran mila tha. Beete kuch mahinon mein hum usse bahut sneh karne lage hain. Parantu ab main anubhav karti hoon ki saghan jangal se sambaddh rehne ke karan tatha ab bade ho jaane ke karan use ghoomne ke liye adhik vistrit sthan chahiye.");
        b(c6, "'क्या कृपा करके उसे स्वीकार करेंगी? सचमुच मैं आपकी बहुत आभारी हूँगी, क्योंकि आप जानती हैं, मैं उसे ऐसे व्यक्ति को नहीं देना चाहती, जो उससे बुरा व्यवहार करे। मेरा विश्वास है, आपके यहाँ उसकी भली भाँति देखभाल हो सकेगी।'\n\nकई वर्ष पूर्व मैंने निश्चय किया कि अब हिरन नहीं पालूँगी, परन्तु आज उस नियम को भंग किए बिना इस कोमल-प्राण जीव की रक्षा सम्भव नहीं है।", "'Kya kripa karke use sweekaar karengi? Sachmuch main aapki bahut aabhari hoongi, kyonki aap jaanti hain, main use aise vyakti ko nahi dena chahti, jo usse bura vyavahaar kare. Mera vishwas hai, aapke yahan uski bhali bhaanti dekhbhaal ho sakegi.'\n\nKai varsh poorva maine nishchay kiya ki ab hiran nahi paloongi, parantu aaj us niyam ko bhang kiye bina is komal-praan jeev ki raksha sambhav nahi hai.");
        b(c6, "सोना भी इसी प्रकार अचानक आई थी, परन्तु वह तब तक अपनी शैशवावस्था भी पार नहीं कर सकी थी। सुनहरे रंग के रेशमी लच्छों की गाँठ के समान उसका कोमल लघु शरीर था। छोटा-सा मुँह और बड़ी-बड़ी पानीदार आँखें। देखती थी तो लगता था कि अभी छलक पड़ेंगी। उनमें प्रसुप्त गति की बिजली की लहर आँखों में कौंध जाती थी।\n\nसब उसके सरल शिशु रूप से इतने प्रभावित हुए कि किसी चम्पकवर्णा रूपसी के उपयुक्त सोना, सुवर्णा, स्वर्णलेखा आदि नाम उसका परिचय बन गए।", "Sona bhi isi prakar achanak aayi thi, parantu vah tab tak apni shaishavastha bhi paar nahi kar saki thi. Sunahre rang ke reshmi lachchhon ki gaanth ke samaan uska komal laghu sharir tha. Chhota-sa munh aur badi-badi panidaar aankhein. Dekhti thi to lagta tha ki abhi chhalak padengi. Unmein prasupt gati ki bijli ki lahar aankhon mein kaundh jaati thi.\n\nSab uske saral shishu roop se itne prabhavit hue ki kisi champakvarna roopsi ke upyukt Sona, Suvarna, Swarnlekha aadi naam uska parichay ban gaye.");
        b(c6, "परन्तु उस बेचारे हरिण-शावक की कथा तो मिट्टी की ऐसी व्यथा कथा है, जिसे मनुष्य निष्ठुरता गढ़ती है। वह न किसी दुर्लभ खान के अमूल्य हीरे की कथा है और न अथाह समुद्र के महार्घ मोती की।\n\nनिर्जीव वस्तुओं से मनुष्य अपने शरीर का प्रसाधन मात्र करता है, अतः उनकी स्थिति मं। परिवर्तन के अतिरिक्त कुछ कथनीय नहीं रहता। परन्तु सजीव से उसे शरीर या अहंकार का जैसा पोषण अभीष्ट है, उसमें जीवन-मृत्यु का संघर्ष है, जो सारी जीवनकथा का तत्व है।", "Parantu us bechare harin-shavak ki katha to mitti ki aisi vyatha katha hai, jise manushya nishthurta gadhti hai. Vah na kisi durlabh khaan ke amulya heere ki katha hai aur na athaah samudra ke mahargh moti ki.\n\nNirjeev vastuon se manushya apne sharir ka prasadhan maatra karta hai, atah unki sthiti mein parivartan ke atirikt kuch kathaniya nahi rehta. Parantu sajeev se use sharir ya ahankar ka jaisa poshan abhisht hai, usmein jeevan-mrityu ka sangharsh hai, jo saari jeevankatha ka tatva hai.");
        b(c6, "जिन्होंने हरीतिमा में लहराते हुए मैदान पर छलाँगें भरते हुए हिरनों के झुंड को देखा होगा, वही उस अद्भुत, गतिशील सौन्दर्य की कल्पना कर सकता है। मानो तरल मरकत के समुद्र में सुनहले फेनवाली लहरों का उद्वेलन हो। परन्तु जीवन के इस चल सौन्दर्य के प्रति शिकारी का आकर्षण नहीं रहता।\n\nमैं प्रायः सोचती हूँ कि मनुष्य जीवन की ऐसी सुन्दर ऊर्जा को निष्क्रिय और जड़ बनाने के कार्य को मनोरंजन कैसे कहता है।", "Jinhone haritima mein lahrate hue maidan par chhalangein bharte hue hiranon ke jhund ko dekha hoga, wahi us adbhut, gatisheel saundarya ki kalpana kar sakta hai. Maano taral markat ke samudra mein sunahle fenwali laharon ka udvelan ho. Parantu jeevan ke is chal saundarya ke prati shikari ka aakarshan nahi rehta.\n\nMain prayah sochti hoon ki manushya jeevan ki aisi sundar oorja ko nishkriya aur jad banane ke karya ko manoranjan kaise kehta hai.");
        b(c6, "मनुष्य मृत्यु को असुन्दर ही नहीं, अपवित्र भी मानता है। उसके प्रियतम आत्मीय जन का शव भी उसके निकट अपवित्र, अस्पृश्य तथा भयजनक हो उठता है। जब मृत्यु इतनी अपवित्र और असुन्दर है, तब उसे बाँटते घूमना क्यों अपवित्र और असुन्दर कार्य नहीं है, यह मैं समझ नहीं पाती।", "Manushya mrityu ko asundar hi nahi, apavitra bhi maanta hai. Uske priyatam aatmiya jan ka shav bhi uske nikat apavitra, asprishya tatha bhayajanak ho uthta hai. Jab mrityu itni apavitra aur asundar hai, tab use baantte ghoomna kyon apavitra aur asundar karya nahi hai, yeh main samajh nahi paati.");
        b(c6, "आकाश में रंगबिरंगे फूलों की घटाओं के समान उड़ते हुए और वीणा, वंशी, मुरज, जलतरंग आदि का वृन्दवादन (आर्केस्ट्रा) बजाते हुए पक्षी कितने सुन्दर जान पड़ते हैं। मनुष्य ने बन्दूक उठाई, निशाना साधा और कई गाते-उड़ते पक्षी धरती पर ढेले के समान आ गिरे। किसी की लाल-पीली चोंचवाली गर्दन टूट गई है, किसी के पीले सुन्दर पंजे टेढ़े हो गए हैं और किसी के इन्द्रधनुषी पंख बिखर गए हैं। क्षतविक्षत रक्तस्नात उन मृत-अर्धमृत लघु गातों में न अब संगीत है; न सौन्दर्य, परन्तु तब भी मारनेवाला अपनी सफलता पर नाच उठता है।", "Aakash mein rangbirange phoolon ki ghataon ke samaan udte hue aur veena, vanshi, muraj, jaltarang aadi ka vrindvadan (orchestra) bajate hue pakshi kitne sundar jaan padte hain. Manushya ne bandook uthai, nishana sadha aur kai gaate-udte pakshi dharti par dhele ke samaan aa gire. Kisi ki laal-peeli chonchwali gardan toot gayi hai, kisi ke peele sundar panje tedhe ho gaye hain aur kisi ke indradhanushi pankh bikhar gaye hain. Kshatvikshat raktasnaat un mrit-ardhmrit laghu gaaton mein na ab sangeet hai; na saundarya, parantu tab bhi maarne-wala apni safalta par naach uthta hai.");
        b(c6, "पक्षिजगत में ही नही, पशुजगत में भी मनुष्य की ध्वंसलीला ऐसी ही निष्ठुर है। पशुजगत में हिरन जैसा निरीह और सुन्दर पशु नहीं है उसकी आँखें तो मानो करुणा की चित्रलिपि हैं। परन्तु इसका भी गतिमय, सजीव सौन्दर्य मनुष्य का मनोरंजन करने में असमर्थ है। मानव को, जो जीवन का श्रेष्ठतम रूप है, जीवन के अन्य रूपों के प्रति इतनी वितृष्णा और विरक्ति और मृत्यु के प्रति इतना मोह और इतना आकर्षण क्यों?", "Pakshijagat mein hi nahi, pashujagat mein bhi manushya ki dhvansleela aisi hi nishthur hai. Pashujagat mein hiran jaisa nireeh aur sundar pashu nahi hai uski aankhein to maano karuna ki chitralipi hain. Parantu iska bhi gatimay, sajeev saundarya manushya ka manoranjan karne mein asamarth hai. Maanav ko, jo jeevan ka shreshthatam roop hai, jeevan ke anya roopon ke prati itni vitrishna aur virakti aur mrityu ke prati itna moh aur itna aakarshan kyon?");
        b(c6, "बेचारी सोना भी मनुष्य की इसी निष्ठुर मनोरंजनप्रियता के कारण अपने अरण्य-परिवेश और स्वजाति से दूर मानव समाज में आ पड़ी थी।\n\nप्रशान्त वनस्थली में जब अलस भाव से रोमन्थन करता हुआ मृग समूह शिकारियों की आहट से चौंककर भागा, तब सोना की माँ सद्यः प्रसूता होने के कारण भागने में असमर्थ रही। सद्यः जात मृगशिशु तो भाग नहीं सकता था, अतः मृगी माँ ने अपनी सन्तान को अपने शरीर की ओट में सुरक्षित रखने के प्रयास में प्राण दिए।", "Bechari Sona bhi manushya ki isi nishthur manoranjanpriyata ke karan apne aranya-parivesh aur swajati se door manav samaj mein aa padi thi.\n\nPrashant vanasthali mein jab alas bhav se romanthan karta hua mrig samooh shikariyon ki aahat se chaunkkar bhaga, tab Sona ki maa sadyah prasoota hone ke karan bhagne mein asamarth rahi. Sadyah jaat mrigshishu to bhaag nahi sakta tha, atah mrigi maa ne apni santaan ko apne sharir ki ot mein surakshit rakhne ke prayas mein praan diye.");
        b(c6, "पता नहीं, दया के कारण या कौतुकप्रियता के कारण शिकारी मृत हिरनी के साथ उसके रक्त से सने और ठंडे स्तनों से चिपटे हुए शावक को जीवित उठा लाए। उनमें से किसी के परिवार की सदय गृहिणी और बच्चों ने उसे पानी मिला दूध पिला-पिलाकर दो-चार दिन जीवित रखा।", "Pata nahi, daya ke karan ya kautukpriyata ke karan shikari mrit hirani ke saath uske rakt se sane aur thande stanon se chipte hue shavak ko jeevit utha laye. Unmein se kisi ke parivar ki saday grihini aur bachchon ne use paani mila doodh pila-pilakar do-char din jeevit rakha.");
        b(c6, "सुस्मिता वसु के समान ही किसी बालिका को मेरा स्मरण हो आया और वह उस अनाथ शावक को मुमूर्ष अवस्था में मेरे पास ले आई। शावक अवांछित तो था ही, उसके बचने की आशा भी धूमिल थी, परन्तु मैंने उसे स्वीकार कर लिया। स्निग्ध सुनहले रंग के कारण सब उसे सोना कहने लगे। दूध पिलाने की शीशी, ग्लूकोज, बकरी का दूध आदि सब कुछ एकत्र करके, उसे पालने का कठिन अनुष्ठान आरम्भ हुआ।", "Susmita Basu ke samaan hi kisi balika ko mera smaran ho aaya aur vah us anaath shavak ko mumursh avastha mein mere paas le aayi. Shavak avanchhit to tha hi, uske bachne ki aasha bhi dhoomil thi, parantu maine use sweekar kar liya. Snigdh sunahle rang ke karan sab use Sona kehne lage. Doodh pilane ki sheeshi, glucose, bakri ka doodh aadi sab kuch ekatra karke, use paalne ka kathin anushthan aarambh hua.");
        b(c6, "उसका मुख इतना छोटा-सा था कि उसमें शीशी का निपल समाता ही नहीं था - उस पर उसे पीना भी नहीं आता था। फिर धीरे-धीरे उसे पीना ही नहीं, दूध की बोतल पहचानना भी आ गया। आँगन में कूदते-फाँदते हुए भी भक्तिन को बोतल साफ करते देखकर वह दौड़ आती और अपनी तरल चकित आँखों से उसे ऐसे देखने लगती, मानो वह कोई सजीव मित्र हो।", "Uska mukh itna chhota-sa tha ki usmein sheeshi ka nipple samata hi nahi tha - us par use peena bhi nahi aata tha. Phir dheere-dheere use peena hi nahi, doodh ki botal pehchanna bhi aa gaya. Aangan mein koodte-faandte hue bhi bhaktin ko botal saaf karte dekhkar vah daud aati aur apni taral chakit aankhon se use aise dekhne lagti, maano vah koi sajeev mitra ho.");
        b(c6, "उसने रात में मेरे पलंग के पाये से सटकर बैठना सीख लिया था, पर वहाँ गंदा न करने की आदत कुछ दिनों के अभ्यास से पड़ सकी। अँधेरा होते ही वह मेरे कमरे में पलंग के पास आ बैठती और फिर सवेरा होने पर ही बाहर निकलती।", "Usne raat mein mere palang ke paaye se satkar baithna seekh liya tha, par wahan ganda na karne ki aadat kuch dinon ke abhyaas se pad saki. Andhera hote hi vah mere kamre mein palang ke paas aa baithti aur phir savera hone par hi baahar nikalti.");
        b(c6, "उसका दिन भर का कार्यकलाप भी एक प्रकार से निश्चित था। विद्यालय और छात्रावास की विद्यार्थिनियों के निकट पहले वह कौतुक का कारण रही, परन्तु कुछ दिन बीत जाने पर वह उनकी ऐसी प्रिय साथिन बन गई, जिसके बिना उनका किसी काम में मन नहीं लगता था।", "Uska din bhar ka karyakalap bhi ek prakar se nishchit tha. Vidyalay aur chhatravas ki vidyarthiniyon ke nikat pehle vah kautuk ka karan rahi, parantu kuch din beet jaane par vah unki aisi priya saathin ban gayi, jiske bina unka kisi kaam mein man nahi lagta tha.");
        b(c6, "दूध पीकर और भीगे चने खाकर सोना कुछ देर कम्पाउण्ड में चारों पैरों को सन्तुलित कर चौकड़ी भरती। फिर वह छात्रावास पहुँचती और प्रत्येक कमरे का भीतर, बाहर निरीक्षण करती। सवेरे छात्रावास में विचित्र-सी क्रियाशीलता रहती है कोई छात्रा हाथ-मुँह धोती है, कोई बालों में कंघी करती है, कोई साड़ी बदलती है, कोई अपनी मेज की सफाई करती है, कोई स्नान करके भीगे कपड़े सूखने के लिए फैलाती है और कोई पूजा करती है।", "Doodh peekar aur bheege chane khakar Sona kuch der compound mein chaaron pairon ko santulit kar chaukdi bharti. Phir vah chhatravas pahunchti aur pratyek kamre ka bheetar, baahar nirikshan karti. Savere chhatravas mein vichitra-si kriyasheelata rehti hai koi chhatra haath-munh dhoti hai, koi baalon mein kanghi karti hai, koi saadi badalti hai, koi apni mez ki safai karti hai, koi snan karke bheege kapde sookhne ke liye failaati hai aur koi pooja karti hai.");
        b(c6, "सोना के पहुँच जाने पर इस विविध कर्म-संकुलता में एक नया काम और जुड़ जाता था। कोई छात्रा उसके माथे पर कुमकुम का बड़ा-सा टीका लगा देती, कोई गले में रिबन बाँध देती और कोई पूजा के बताशे खिला देती। मेस में उसके पहुँचते ही छात्राएँ ही नहीं, नौकर-चाकर तक दौड़ आते और सभी उसे कुछ-न-कुछ खिलाने को उतावले रहते, परन्तु उसे बिस्कुट को छोड़कर कम खाद्य पदार्थ पसन्द थे।", "Sona ke pahunch jaane par is vividh karm-sankulta mein ek naya kaam aur jud jaata tha. Koi chhatra uske maathe par kumkum ka bada-sa teeka laga deti, koi gale mein ribbon baandh deti aur koi pooja ke batashe khila deti. Mess mein uske pahunchte hi chhatrayein hi nahi, naukar-chaakar tak daud aate aur sabhi use kuch-na-kuch khilane ko utavale rehte, parantu use biscuit ko chhodkar kam khadya padarth pasand the.");
        b(c6, "छात्रावास का जागरण और जलपान अध्याय समाप्त होने पर वह घास के मैदान में कभी दूब चरती और कभी उस पर लोटती रहती। मेरे भोजन का समय वह किस प्रकार जान लेती थी, यह समझने का उपाय नहीं है, परन्तु वह ठीक उसी समय भीतर आ जाती और तब तक मुझसे सटी खड़ी रहती जब तक मेरा खाना समाप्त न हो जाता। कुछ चावल, रोटी आदि उसका भी प्राप्य रहता था, परन्तु उसे कच्ची सब्जी ही अधिक भाती थी।", "Chhatravas ka jagaran aur jalpaan adhyay samapt hone par vah ghaas ke maidan mein kabhi doob charti aur kabhi us par lotti rehti. Mere bhojan ka samay vah kis prakar jaan leti thi, yeh samajhne ka upay nahi hai, parantu vah theek usi samay bheetar aa jaati aur tab tak mujhse sati khadi rehti jab tak mera khana samapt na ho jaata. Kuch chaawal, roti aadi uska bhi praapya rehta tha, parantu use kachchi sabzi hi adhik bhaati thi.");
        b(c6, "घंटी बजते ही वह फिर प्रार्थना के मैदान में पहुँच जाती और उसके समाप्त होने पर छात्रावास के समान ही कक्षाओं के भीतर-बाहर चक्कर लगाना आरम्भ करती।", "Ghanti bajte hi vah phir prarthana ke maidan mein pahunch jaati aur uske samapt hone par chhatravas ke samaan hi kakshaon ke bheetar-baahar chakkar lagana aarambh karti.");
        b(c6, "उसे छोटे बच्चे अधिक प्रिय थे, क्योंकि उनके साथ खेलने का अधिक अवकाश रहता था। वे पंक्तिबद्ध खड़े होकर सोना-सोना पुकारते और वह उनके ऊपर से छ्लॉग लगाकर एक ओर से दूसरी ओर कूदती रहती। सरकस जैसा खेल कभी घंटों चलता, क्योंकि खेल के घंटों में बच्चों की कक्षा के उपरान्त दूसरी आती रहती।", "Use chhote bachche adhik priya the, kyonki unke saath khelne ka adhik avkash rehta tha. Ve pankitbaddh khade hokar Sona-Sona pukaarte aur vah unke oopar se chhalang lagakar ek or se doosri or koodti rehti. Circus jaisa khel kabhi ghanton chalta, kyonki khel ke ghanton mein bachchon ki kaksha ke uprant doosri aati rehti.");
        b(c6, "मेरे प्रति स्नेह-प्रदर्शन के उसके कई प्रकार थे। बाहर खड़े होने पर वह सामने या पीछे से छ्लॉग लगाती और मेरे सिर के ऊपर से दूसरी ओर निकल जाती। प्रायः देखनेवालों को भय होता था कि उसके पैरों से मेरे सिर पर चोट न लग जावे, परन्तु वह पैरों को इस प्रकार सिकोड़े रहती थी और मेरे सिर को इतनी ऊँचाई से लाँघती थी कि चोट लगने की कोई सम्भावना ही नहीं रहती थी।", "Mere prati sneh-pradarshan ke uske kai prakar the. Baahar khade hone par vah saamne ya peechhe se chhalang lagati aur mere sir ke oopar se doosri or nikal jaati. Prayah dekhnewalon ko bhay hota tha ki uske pairon se mere sir par chot na lag jaave, parantu vah pairon ko is prakar sikode rehti thi aur mere sir ko itni oonchai se laanghti thi ki chot lagne ki koi sambhavana hi nahi rehti thi.");
        b(c6, "भीतर आने पर वह मेरे पैरों से अपना शरीर रगड़ने लगती। मेरे बैठे रहने पर वह साड़ी का छोर मुँह में भर लेती और कभी पीछे चुपचाप खड़े होकर चोटी ही चबा डालती। डाँटने पर वह अपनी बड़ी गोल और चकित आँखों में ऐसी अनिर्वचनीय जिज्ञासा भरकर एकटक देखने लगती कि हँसी आ जाती।", "Bheetar aane par vah mere pairon se apna sharir ragadne lagti. Mere baithe rehne par vah saadi ka chhor munh mein bhar leti aur kabhi peechhe chupchaap khade hokar choti hi chaba daalti. Daantne par vah apni badi gol aur chakit aankhon mein aisi anirvachaniya jigyasa bharkar ektak dekhne lagti ki hansi aa jaati.");
        b(c6, "कविगुरु कालिदास ने अपने नाटक में मृगी-मृग-शावक आदि को इतना महत्व क्यों दिया है, यह हिरन पालने के उपरान्त ही ज्ञात होता है।", "Kaviguru Kalidas ne apne natak mein mrigi-mrig-shavak aadi ko itna mahatva kyon diya hai, yeh hiran paalne ke uprant hi gyaat hota hai.");
        b(c6, "पालने पर वह पशु न रहकर ऐसा स्नेही संगी बन जाता है, जो मनुष्य के एकान्त शून्य को भर देता है, परन्तु खीझ उत्पन्न करने वाली जिज्ञासा से उसे बेझिल नहीं बनाता। यदि मनुष्य दूसरे मनुष्य से केवल नेत्रों से बात कर सकता, तो बहुत-से विवाद समाप्त हो जाते, परन्तु प्रकृति को यह अभीष्ट नहीं रहा होगा।", "Paalne par vah pashu na rahkar aisa snehi sangi ban jaata hai, jo manushya ke ekaant shunya ko bhar deta hai, parantu kheejh utpann karne wali jigyasa se use bojhil nahi banata. Yadi manushya doosre manushya se keval netron se baat kar sakta, to bahut-se vivaad samapt ho jaate, parantu prakriti ko yeh abhisht nahi raha hoga.");
        b(c6, "सम्भवतः इसी से मनुष्य वाणी द्वारा परस्पर किए गए आघातों और सार्थक शब्दभार से अपने प्राणों पर इन भाषाहीन जीवों की स्नेह तरल दृष्टि का चन्दन लेप लगाकर स्वस्थ और आश्वस्त होना चाहता है।", "Sambhavatah isi se manushya vaani dwara paraspar kiye gaye aaghaton aur saarthak shabdabhaar se apne praanon par in bhashaheen jeevon ki sneh taral drishti ka chandan lep lagakar swasth aur aashwast hona chahta hai.");
        b(c6, "सरस्वती वाणी से ध्वनित-प्रतिध्वनित कण्व के आश्रम में ऋषियों, ऋषि-पत्नियों, ऋषि-कुमार-कुमारिकाओं के साथ मूक अज्ञान मृगों की स्थिति भी अनिवार्य है। मन्त्रपूत कुटियों के द्वार को नीहारकण चाहने वाले मृग रँध लेते हैं। विदा लेती हुई शकुन्तला का गुरुजनों के उपदेश-आशीर्वाद से बेझिल अंचल, उसका अपत्यवत पालित मृगछौना थाम लेता है।", "Saraswati vaani se dhvanit-pratidhvanit Kanva ke aashram mein rishiyon, rishi-patniyon, rishi-kumar-kumarikaon ke saath mook agyaan mrigo ki sthiti bhi anivarya hai. Mantrapoot kutiyon ke dwar ko neehaarkan chahne wale mrig randh lete hain. Vida leti hui Shakuntala ka gurujanon ke updesh-aashirvaad se bojhil anchal, uska apatyavat paalit mrigchhauna thaam leta hai.");
        b(c6, "यस्य त्वया व्रणविरोपणमिंडगुदीनां\nतैलं न्यषिच्यत मुखे कुशसूचिविधै।\nश्यामाकमुष्टि परिवर्धितको जहाति\nसो यं न पुत्रकृतकः पदवीं मृगस्ते ॥\nअभिज्ञानशाकुन्तलम्", "Yasya tvaya vranaviropanamindagudinam\ntailam nyashichyat mukhe kushasoochividhai.\nShyamakamushti parivardhitako jahati\nso yam na putrakritakah padavim mrigaste ||\nAbhijnanashakuntalam");
        b(c6, "शकुन्तला के प्रश्न करने पर कि कौन मेरा अंचल खींच रहा है, कण्व कहते हैं :\n\nकुश के काँटे से जिसका मुख छिद जाने पर तू उसे अच्छा करने के लिए हिंगोट का तेल लगाती थी, जिसे तूने मुट्ठी भर-भर सावाँ के दानों से पाला है, जो तेरे निकट पुत्रवत् है, वही तेरा मृग तुझे रोक रहा है।", "Shakuntala ke prashna karne par ki kaun mera anchal kheench raha hai, Kanva kehte hain :\n\nKush ke kaante se jiska mukh chhid jaane par tu use achcha karne ke liye hingot ka tel lagati thi, jise toone mutthi bhar-bhar saavan ke daanon se pala hai, jo tere nikat putravat hai, wahi tera mrig tujhe rok raha hai.");
        b(c6, "साहित्य ही नहीं, लोकगीतों की मर्मस्पर्शिता में भी मृगों का विशेष योगदान रहता है।\n\nपशु मनुष्य के निश्छल स्नेह से परिचित रहते हैं, उनकी ऊँची-नीची सामाजिक स्थितियों से नहीं, यह सत्य मुझे सोना से अनायास प्राप्त हो गया।", "Sahitya hi nahi, lokgeeton ki marmsparshita mein bhi mrigo ka vishesh yogdaan rehta hai.\n\nPashu manushya ke nishchhal sneh se parichit rehte hain, unki oonchi-neechi samajik sthitiyon se nahi, yeh satya mujhe Sona se anayaas praapt ho gaya.");
        b(c6, "अनेक विद्यार्थिनियों की भारी-भरकम गुरुजी से सोना को क्या लेना-देना था। वह तो उस दृष्टि को पहचानती थी, जिसमें उसके लिए स्नेह छलकता था और उन हाथों को जानती थी, जिन्होंने यत्नपूर्वक दूध की बोतल उसके मुख से लगाई थी।", "Anek vidyarthiniyon ki bhaari-bharkam guruji se Sona ko kya lena-dena tha. Vah to us drishti ko pehchanti thi, jismein uske liye sneh chhalakta tha aur un hathon ko jaanti thi, jinhone yatnapoorvak doodh ki botal uske mukh se lagayi thi.");
        b(c6, "यदि सोना को अपने स्नेह की अभिव्यक्ति के लिए मेरे सिर के ऊपर से कूदना आवश्यक लगेगा तो वह कूदेगी ही। मेरी किसी अन्य परिस्थिति से प्रभावित होना, उसके लिए सम्भव ही नहीं था।", "Yadi Sona ko apne sneh ki abhivyakti ke liye mere sir ke oopar se koodna aavashyak lagega to vah koodegi hi. Meri kisi anya paristhiti se prabhavit hona, uske liye sambhav hi nahi tha.");
        b(c6, "कुत्ता स्वामी और सेवक का अन्तर जानता है और स्वामी की स्नेह या क्रोध की प्रत्येक मुद्रा से परिचित रहता है। स्नेह से बुलाने पर वह गदगद होकर निकट आ जाता है और क्रोध करते ही सभीत और दयनीय बनकर दुबक जाता है।", "Kutta swami aur sevak ka antar jaanta hai aur swami ki sneh ya krodh ki pratyek mudra se parichit rehta hai. Sneh se bulane par vah gadgad hokar nikat aa jaata hai aur krodh karte hi sabheet aur dayaniya bankar dubak jaata hai.");
        b(c6, "पर हिरन यह अन्तर नहीं जानता, अतः उसका अपने पालनेवाले से डरना कठिन है। यदि उस पर क्रोध किया जावे तो वह अपनी चकित आँखों में और अधिक विस्मय भरकर पालनेवाले की दृष्टि से दृष्टि मिलाकर खड़ा रहेगा - मानो पूछता हो, क्या यह उचित है? वह केवल स्नेह पहचानता है, जिसकी स्वीकृति जताने के लिए उसकी विशेष चेष्टाएँ हैं।", "Par hiran yeh antar nahi jaanta, atah uska apne paalnewale se darna kathin hai. Yadi us par krodh kiya jaave to vah apni chakit aankhon mein aur adhik vismaya bharkar paalnewale ki drishti se drishti milakar khada rahega - maano poochhta ho, kya yeh uchit hai? Vah keval sneh pehchanta hai, jiski sweekriti jatane ke liye uski vishesh cheshtayein hain.");
        b(c6, "मेरी बिल्ली गोधूली, कुत्ते हेमन्त-वसन्त, कुत्ती फ्लोरा सब पहले इस नए अतिथि को देखकर रुष्ट हुए, परन्तु सोना ने थोड़े ही दिनों में सबसे सख्य स्थापित कर लिया। फिर तो वह घास पर लेट जाती और कुत्ते-बिल्ली उस पर उछलते-कूदते रहते। कोई उसके कान खींचता, कोई पैर और जब वे इस खेल में तन्मय हो जाते, तब वह अचानक चौकड़ी भरकर भागती और वे गिरते-पड़ते उसके पीछे दौड़ लगाते।", "Meri billi Godhooli, kutte Hemant-Vasant, kutti Flora sab pehle is naye atithi ko dekhkar rusht hue, parantu Sona ne thode hi dinon mein sabse sakhya sthaapit kar liya. Phir to vah ghaas par let jaati aur kutte-billi us par uchhalte-koodte rehte. Koi uske kaan kheenchta, koi pair aur jab ve is khel mein tanmaya ho jaate, tab vah achanak chaukdi bharkar bhaagti aur ve girte-padte uske peechhe daud lagate.");
        b(c6, "वर्ष भर का समय बीत जाने पर सोना हरिण शावक से हरिणी में परिवर्तित होने लगी। उसके शरीर के पीताभ रोयें ताम्रवर्णी झलक देने लगे। टाँगें अधिक सुडौल और खुरों के कालेपन में चमक आ गई। ग्रीवा अधिक बंकिम और लचीली हो गई। पीठ में भराव वाला उतार-चढ़ाव और स्निग्धता दिखाई देने लगी। परन्तु सबसे अधिक विशेषता तो उसकी आँखों और दृष्टि में मिलती थी। आँखों के चारों ओर खिंची कज्जल कोर में नीले गोलक और दृष्टि ऐसी लगती थी, मानो नीलम के बल्बों में उजली विद्युत का स्फुरण हो।", "Varsh bhar ka samay beet jaane par Sona harin shavak se harini mein parivartit hone lagi. Uske sharir ke peetabh royein taamravarni jhalak dene lage. Taangein adhik sudaul aur khuron ke kaalepan mein chamak aa gayi. Greeva adhik bankim aur lachili ho gayi. Peeth mein bharaav wala utaar-chadhaav aur snigdhata dikhayi dene lagi. Parantu sabse adhik visheshta to uski aankhon aur drishti mein milti thi. Aankhon ke chaaron or khinchi kajjal kor mein neele golak aur drishti aisi lagti thi, maano neelam ke balbon mein ujli vidyut ka sphuran ho.");
        b(c6, "सम्भवतः अब उसमें वन तथा स्वजाति का स्मृति-संस्कार जागने लगा था। प्रायः सूने मैदान में वह गर्दन ऊँची करके किसी की आहट की प्रतीक्षा में खड़ी रहती। वासन्ती हवा बहने पर यह मूक प्रतीक्षा और अधिक मार्मिक हो उठती। शैशव के साथियों और उनकी उछल-कूद से अब उसका पहले जैसा मनोरंजन नहीं होता था, अतः उसकी प्रतीक्षा के क्षण अधिक होते जाते थे।", "Sambhavatah ab usmein van tatha swajaati ka smriti-sanskaar jaagne laga tha. Prayah soone maidan mein vah gardan oonchi karke kisi ki aahat ki pratiksha mein khadi rehti. Vasanti hawa behne par yeh mook pratiksha aur adhik marmik ho uthti. Shaishav ke saathiyon aur unki uchhal-kood se ab uska pehle jaisa manoranjan nahi hota tha, atah uski pratiksha ke kshan adhik hote jaate the.");
        b(c6, "इसी बीच फ्लोरा ने भक्तिन की कुछ अँधेरी कोठरी के एकान्त कोने में चार बच्चों को जन्म दिया और वह खेल के संगियों को भूल कर अपनी नवीन सृष्टि के संरक्षण में व्यस्त हो गई। एक-दो दिन सोना अपनी सखी को खोजती रही, फिर उसे इतने लघु जीवों से घिरा देख कर उसकी स्वाभाविक चकित दृष्टि गम्भीर विस्मय से भर गई।", "Isi beech Flora ne bhaktin ki kuch andheri kothari ke ekaant kone mein chaar bachchon ko janm diya aur vah khel ke sangiyon ko bhool kar apni naveen srishti ke sanrakshan mein vyast ho gayi. Ek-do din Sona apni sakhi ko khojti rahi, phir use itne laghu jeevon se ghira dekh kar uski swabhavik chakit drishti gambhir vismaya se bhar gayi.");
        b(c6, "एक दिन देखा, फ्लोरा कहीं बाहर घूमने गई है और सोना भक्तिन की कोठरी में निश्चिन्त लेटी है। पिल्ले आँखें बन्द करने के कारण चीं-चीं करते हुए सोना के उदर में दूध खोज रहे थे। तब से सोना के नित्य के कार्यक्रम में पिल्लों के बीच लेट जाना भी सम्मिलित हो गया। आश्चर्य की बात यह थी कि फ्लोरा, हेमन्त, वसन्त या गोधूली को तो अपने बच्चों के पास फटकने भी नहीं देती थी, परन्तु सोना के संरक्षण में उन्हें छोड़कर आश्वस्त भाव से इधर-उधर घूमने चली जाती थी।", "Ek din dekha, Flora kahin baahar ghoomne gayi hai aur Sona bhaktin ki kothari mein nishchint leti hai. Pille aankhein band karne ke karan cheen-cheen karte hue Sona ke udar mein doodh khoj rahe the. Tab se Sona ke nitya ke karyakram mein pillon ke beech let jaana bhi sammilit ho gaya. Aashcharya ki baat yeh thi ki Flora, Hemant, Vasant ya Godhooli ko to apne bachchon ke paas fatakne bhi nahi deti thi, parantu Sona ke sanrakshan mein unhein chhodkar aashwast bhaav se idhar-udhar ghoomne chali jaati thi.");
        b(c6, "सम्भवतः वह सोना की स्नेही और अहिंसक प्रकृति से परिचित हो गई थी। पिल्लों के बड़े होने पर और उनकी आँखें खुल जाने पर सोना ने उन्हें भी अपने पीछे घूमनेवाली सेना में सम्मिलित कर लिया और मानो इस वृ‌द्धि के उपलक्ष में आनन्दोत्सव मनाने के लिए अधिक देर तक मेरे सिर के आरपार चौकड़ी भरती रही। पर कुछ दिनों के उपरान्त जब यह आनन्दोत्सव पुराना पड़ गया, तब उसकी शब्दहीन, संज्ञाहीन प्रतीक्षा की स्तब्ध घड़ियाँ फिर लौट आईं।", "Sambhavatah vah Sona ki snehi aur ahinsak prakriti se parichit ho gayi thi. Pillon ke bade hone par aur unki aankhein khul jaane par Sona ne unhein bhi apne peechhe ghoomnewali sena mein sammilit kar liya aur maano is vriddhi ke uplakshya mein aanandotsav manane ke liye adhik der tak mere sir ke aarpaar chaukdi bharti rahi. Par kuch dinon ke upraant jab yeh aanandotsav purana pad gaya, tab uski shabdheen, sangyaheen pratiksha ki stabdh ghadiyan phir laut aayin.");
        b(c6, "उसी वर्ष गर्मियों में मेरा बद्रीनाथ-यात्रा का कार्यक्रम बना। प्रायः मैं अपने पालतू जीवों के कारण प्रवास कम करती हूँ। उनकी देखरेख के लिए सेवक रहने पर भी मैं उन्हें छोड़कर आश्वस्त नहीं हो पाती। भक्तिन, अनुरूप (नौकर) आदि तो साथ जाने वाले थे ही, पालतू जीवों में से मैंने फ्लोरा को साथ ले जाने का निश्चिय किया, क्योंकि वह मेरे बिना रह नहीं सकती थी।", "Usi varsh garmiyon mein mera Badrinath-yatra ka karyakram bana. Prayah main apne paaltu jeevon ke karan pravaas kam karti hoon. Unki dekhrekh ke liye sevak rehne par bhi main unhein chhodkar aashwast nahi ho paati. Bhaktin, Anuroop (naukar) aadi to saath jaane wale the hi, paaltu jeevon mein se maine Flora ko saath le jaane ka nishchay kiya, kyonki vah mere bina rah nahi sakti thi.");
        b(c6, "छात्रावास बन्द था, अतः सोना के नित्य नैमित्तिक कार्य-कलाप भी बन्द हो गए थे। मेरी उपस्थिति का भी अभाव था, अतः उसके आनन्दोल्लास के लिए भी अवकाश कम था।", "Chhatravas band tha, atah Sona ke nitya naimittik karya-kalaap bhi band ho gaye the. Meri upasthiti ka bhi abhaav tha, atah uske aanandollaas ke liye bhi avkaash kam tha.");
        b(c6, "हेमन्त-वसन्त मेरी यात्रा और तज्जनित अनुपस्थिति से परिचित हो चुके थे। होल्डाल बिछाकर उसमें बिस्तर रखते ही वे दौड़कर उस पर लेट जाते और भौंकने तथा क्रन्दन की ध्वनियों के सम्मिलित स्वर में मुझे मानो उपालम्भ देने लगते। यदि उन्हें बाँध न रखा जाता तो वे कार में घुसकर बैठ जाते या उसके पीछे-पीछे दौड़कर स्टेशन तक जा पहुँचते। परन्तु जब मैं चली जाती, तब वे उदास भाव से मेरे लौटने की प्रतीक्षा करने लगते।", "Hemant-Vasant meri yatra aur tajjanit anupasthiti se parichit ho chuke the. Holdall bichhakar usmein bistar rakhte hi ve daudkar us par let jaate aur bhaunkne tatha krandan ki dhvaniyon ke sammilit swar mein mujhe maano upaalambh dene lagte. Yadi unhein baandh na rakha jaata to ve car mein ghuskar baith jaate ya uske peechhe-peechhe daudkar station tak jaa pahunchte. Parantu jab main chali jaati, tab ve udaas bhaav se mere lautne ki pratiksha karne lagte.");
        b(c6, "सोना की सहज चेतना में मेरी यात्रा जैसी स्थिति का बोध था, नप्रत्यावर्तन का; इसी से उसकी निराश जिज्ञासा और विस्मय का अनुमान मेरे लिए सहज था।", "Sona ki sahaj chetna mein meri yatra jaisi sthiti ka bodh tha, na-pratyavartan ka; isi se uski niraash jigyasa aur vismaya ka anumaan mere liye sahaj tha.");
        b(c6, "पैदल जाने-आने के निश्चय के कारण बद्रीनाथ की यात्रा में ग्रीष्मावकाश समाप्त हो गया। 2 जुलाई को लौटकर जब मैं बँगले के द्वार पर आ खड़ी हुई, तब बिछुड़े हुए पालतू जीवों में कोलाहल होने लगा।", "Paidal jaane-aane ke nishchay ke karan Badrinath ki yatra mein greeshmavkaash samapt ho gaya. 2 July ko lautkar jab main bangle ke dwar par aa khadi hui, tab bichhude hue paaltu jeevon mein kolahal hone laga.");
        b(c6, "गोधूली कूदकर कन्धे पर आ बैठी। हेमन्त-वसन्त मेरे चारों ओर परिक्रमा करके हर्ष की ध्वनियों में मेरा स्वागत करने लगे। पर मेरी दृष्टि सोना को खोजने लगी। क्यों वह अपना उल्लास व्यक्त करने के लिए मेरे सिर के ऊपर से लाँग नहीं लगाती ? सोना कहाँ है, पूछने पर माली आँखें पोंछने लगा और चपरासी, चौकीदार एक-दूसरे का मुख देखने लगे। वे लोग, आने के साथ ही मुझे कोई दुःखद समाचार नहीं देना चाहते थे, परन्तु माली की भावुकता ने बिना बोले ही उसे दे डाला।", "Godhooli koodkar kandhe par aa baithi. Hemant-Vasant mere chaaron or parikrama karke harsh ki dhvaniyon mein mera swagat karne lage. Par meri drishti Sona ko khojne lagi. Kyon vah apna ullaas vyakt karne ke liye mere sir ke oopar se chhalang nahi lagati ? Sona kahan hai, poochhne par maali aankhein ponchhne laga aur chaprasi, chaukidaar ek-doosre ka mukh dekhne lage. Ve log, aane ke saath hi mujhe koi dukhad samachaar nahi dena chahte the, parantu maali ki bhavukta ne bina bole hi use de daala.");
        b(c6, "ज्ञात हुआ कि छात्रावास के सन्नाटे और फ्लोरा के तथा मेरे अभाव के कारण सोना इतनी अस्थिर हो गई थी कि इधर-उधर कुछ खोजती-सी वह प्रायः कम्पाउण्ड से बाहर निकल जाती थी। इतनी बड़ी हिरनी को पालनेवाले तो कम थे, परन्तु उससे खाद्य और स्वाद प्राप्त करने के इच्छुक व्यक्तियों का बाहुल्य था। इसी आशंका से माली ने उसे मैदान में एक लम्बी रस्सी से बाँधना आरम्भ कर दिया था।", "Gyaat hua ki chhatravas ke sannate aur Flora ke tatha mere abhaav ke karan Sona itni asthir ho gayi thi ki idhar-udhar kuch khojti-si vah prayah compound se baahar nikal jaati thi. Itni badi hirani ko paalnewale to kam the, parantu usse khadya aur swaad praapt karne ke ichchhuk vyaktiyon ka bahulya tha. Isi aashanka se maali ne use maidan mein ek lambi rassi se baandhna aarambh kar diya tha.");
        b(c6, "एक दिन न जाने किस स्तब्धता की स्थिति में बन्धन की सीमा भूलकर बहुत ऊचाँई तक उछली और रस्सी के कारण मुख के बल धरती पर आ गिरी। वही उसकी अन्तिम साँस और अन्तिम उछाल थी।", "Ek din na jaane kis stabdhata ki sthiti mein bandhan ki seema bhoolkar bahut oonchai tak uchhali aur rassi ke karan mukh ke bal dharti par aa giri. Wahi uski antim saans aur antim uchhaal thi.");
        b(c6, "सब उस सुनहले रेशम की गठरी के शरीर को गंगा में प्रवाहित कर आए और इस प्रकार किसी निर्जन वन में जन्मी और जन-संकुलता में पली सोना की करुण कथा का अन्त हुआ।\n\nयह सुनकर मैंने निश्चय किया था कि हिरन नहीं पालूँगी, पर संयोग से फिर हिरन ही पालना पड़ रहा है।", "Sab us sunahle resham ki gathri ke sharir ko ganga mein pravahit kar aaye aur is prakar kisi nirjan van mein janmi aur jan-sankulta mein pali Sona ki karun katha ka ant hua.\n\nYeh sunkar maine nishchay kiya tha ki hiran nahi paloongi, par sanyog se phir hiran hi paalna pad raha hai.");

        // ==========================================
        // CHAPTER 7
        // ==========================================
        let c7 = addChap("महान विभूतियाँ", "Mahaan Vibhutiyan");
        b(c7, "महान विभूतियाँ\nरेणु सरन", "Mahaan Vibhutiyan\nRenu Saran");
        b(c7, "जब मैं अपने देश और संसार के इतिहास पर दृष्टि डालती हूँ, तो यह अनुभव करती हूँ कि किसी भी युग की पहचान उसके भव्य भवनों या युद्धों से नहीं, बल्कि उन व्यक्तियों से बनती है जिन्होंने अपने जीवन से मानवता को दिशा दी। ऐसे ही असाधारण व्यक्तित्व, जिन्होंने साधारण परिस्थितियों में जन्म लेकर असाधारण कार्य किए, महान विभूतियाँ कहलाते हैं। वे अपने-अपने क्षेत्र में कार्य करते हुए न केवल व्यक्तिगत सफलता प्राप्त करते हैं, बल्कि समाज और आने वाली पीढ़ियों के लिए प्रेरणा का स्रोत भी बन जाते हैं।", "Jab main apne desh aur sansar ke itihaas par drishti daalti hoon, to yeh anubhav karti hoon ki kisi bhi yug ki pehchaan uske bhavya bhavanon ya yuddhon se nahi, balki un vyaktiyon se banti hai jinhone apne jeevan se manavata ko disha di. Aise hi asadharan vyaktitva, jinhone sadharan paristhitiyon mein janm lekar asadharan karya kiye, mahaan vibhutiyan kehlaate hain. Ve apne-apne kshetra mein karya karte hue na keval vyaktigat safalta praapt karte hain, balki samaj aur aane wali peedhiyon ke liye prerana ka strot bhi ban jaate hain.");
        b(c7, "इस अध्याय के माध्यम से मैं चार ऐसी महान विभूतियों के जीवन और कृतित्व को प्रस्तुत कर रही हूँ, जिन्होंने खेल, संगीत, मानव सेवा और आधुनिक विज्ञान के क्षेत्र में विश्व पटल पर भारत और मानवता का नाम उज्ज्वल किया। हॉकी के जादूगर मेजर ध्यानचंद, भारतीय शास्त्रीय संगीत को विश्व मंच तक पहुँचाने वाले पंडित रवि शंकर, करुणा और सेवा की प्रतिमूर्ति मदर टेरेसा तथा आधुनिक तकनीकी युग के अग्रदूत बिल गेट्स- ये सभी अपने-अपने क्षेत्र में महान होते हुए भी सादगी, समर्पण और सेवा के प्रतीक रहे हैं।", "Is adhyay ke madhyam se main chaar aisi mahaan vibhutiyon ke jeevan aur krititva ko prastut kar rahi hoon, jinhone khel, sangeet, manav seva aur aadhunik vigyan ke kshetra mein vishwa patal par bharat aur manavata ka naam ujjwal kiya. Hockey ke jadugar Major Dhyan Chand, bhartiya shastriya sangeet ko vishwa manch tak pahunchane wale Pandit Ravi Shankar, karuna aur seva ki pratimurti Mother Teresa tatha aadhunik takneeki yug ke agradoot Bill Gates- ye sabhi apne-apne kshetra mein mahaan hote hue bhi saadgi, samarpan aur seva ke prateek rahe hain.");
        b(c7, "मेजर ध्यानचंद को भारतीय हॉकी को पूरी दुनिया के सामने लाने का श्रेय दिया जाता है। उनका जन्म 29 अगस्त 1906 को इलाहाबाद, उत्तर प्रदेश में हुआ। वे मात्र 16 वर्ष की आयु में ही सेना में भर्ती हो गए और वहीं से उनका हॉकी जीवन आरंभ हुआ। जल्द ही वे अपने अद्भुत खेल कौशल के कारण देश-विदेश में पहचाने जाने लगे।", "Major Dhyan Chand ko bhartiya hockey ko poori duniya ke saamne laane ka shreya diya jaata hai. Unka janm 29 August 1906 ko Allahabad, Uttar Pradesh mein hua. Ve maatra 16 varsh ki aayu mein hi sena mein bharti ho gaye aur wahin se unka hockey jeevan aarambh hua. Jald hi ve apne adbhut khel kaushal ke karan desh-videsh mein pehchane jaane lage.");
        b(c7, "उन्होंने एम्सटर्डम ओलंपिक्स 1928, लॉस एंजिलिस ओलंपिक्स 1932 और बर्लिन ओलंपिक्स 1936 में भारत को लगातारत तीन स्वर्ण पदक दिलवाए। ऐतिहासिक बर्लिन ओलंपिक्स में वे स्वर्ण पदक जीतने वाली भारतीय टीम के कप्तान थे। अपने पूरे खेल जीवन में उन्होंने 40 से अधिक अंतरराष्ट्रीय मैचों में लगभग 300 गोल किए, जो आज भी एक अ‌द्वितीय रिकॉर्ड माना जाता है।", "Unhone Amsterdam Olympics 1928, Los Angeles Olympics 1932 aur Berlin Olympics 1936 mein bharat ko lagataar teen swarna padak dilwaye. Aitihasik Berlin Olympics mein ve swarna padak jeetne wali bhartiya team ke kaptaan the. Apne poore khel jeevan mein unhone 40 se adhik antarrashtriya matchon mein lagbhag 300 goal kiye, jo aaj bhi ek adwitiya record maana jaata hai.");
        b(c7, "1936 के ओलंपिक में जर्मनी के विरुद्ध उनका खेल इतना प्रभावशाली था कि कहा जाता है, मैच के बाद जर्मनी के चांसलर एडोल्फ हिटलर ने उनसे जर्मनी के लिए खेलने का प्रस्ताव रखा। इस पर मेजर ध्यानचंद का उत्तर था - \"कुछ नहीं सर, मेरा भारत मेरा देश है।\" यह कथन उनके अटूट देशप्रेम को दर्शाता है। अपनी असाधारण क्षमता के कारण ही वे \"हॉकी के जादूगर” कहलाए। 3 दिसंबर 1989 को उनका निधन हो गया, किंतु उनका जीवन आज भी खेल प्रेमियों के लिए प्रेरणा है।", "1936 ke Olympic mein Germany ke viruddh unka khel itna prabhavshali tha ki kaha jaata hai, match ke baad Germany ke chancellor Adolf Hitler ne unse Germany ke liye khelne ka prastaav rakha. Is par Major Dhyan Chand ka uttar tha - \"Kuch nahi sir, mera bharat mera desh hai.\" Yeh kathan unke atoot deshprem ko darshata hai. Apni asadharan kshamata ke karan hi ve \"Hockey ke Jadugar” kehlaaye. 3 December 1989 ko unka nidhan ho gaya, kintu unka jeevan aaj bhi khel premiyon ke liye prerana hai.");
        b(c7, "पंडित रवि शंकर भारतीय शास्त्रीय संगीत के ऐसे महान कलाकार थे, जिन्होंने सितार के माध्यम से भारत की सांस्कृतिक पहचान को अंतरराष्ट्रीय स्तर पर स्थापित किया। उनका जन्म 7 अप्रैल 1920 को वाराणसी में हुआ। उनके बड़े भाई उदय शंकर एक प्रसिद्ध शास्त्रीय नर्तक थे, जिनके साथ प्रारंभ में रवि शंकर जी ने विदेश यात्राएँ कीं और नृत्य नाटिकाओं में भाग लिया।", "Pandit Ravi Shankar bhartiya shastriya sangeet ke aise mahaan kalakaar the, jinhone sitar ke madhyam se bharat ki sanskritik pehchaan ko antarrashtriya star par sthapit kiya. Unka janm 7 April 1920 ko Varanasi mein hua. Unke bade bhai Uday Shankar ek prasiddh shastriya nartak the, jinke saath prarambh mein Ravi Shankar ji ne videsh yatrayein keen aur nritya natikaon mein bhaag liya.");
        b(c7, "1938 में उन्होंने नृत्य को त्यागकर संगीत को अपना जीवन बना लिया और मैहर घराने के महान उस्ताद अलाउ‌द्दीन ख़ान से सितार वादन का प्रशिक्षण प्राप्त किया। प्रशिक्षण पूर्ण करने के बाद उन्होंने IPTA से जुड़कर रंगमंच और बैले के लिए संगीत रचना प्रारंभ की। वे ऑल इंडिया रेडियो में ऑर्केस्ट्रल हेड भी रहे।", "1938 mein unhone nritya ko tyagkar sangeet ko apna jeevan bana liya aur Maihar gharane ke mahaan ustaad Alauddin Khan se sitar vaadan ka prashikshan praapt kiya. Prashikshan poorn karne ke baad unhone IPTA se judkar rangmanch aur ballet ke liye sangeet rachna prarambh ki. Ve All India Radio mein orchestral head bhi rahe.");
        b(c7, "1954 में उन्होंने सोवियत यूनियन में पहला विदेशी प्रदर्शन किया और इसके बाद एडिनबर्ग फ़ेस्टिवल तथा रॉयल फेस्टिवल हॉल जैसे प्रतिष्ठित मंचों पर अपनी कला का प्रदर्शन किया। 1960 के दशक में उन्होंने विदेशी कलाकारों के साथ मिलकर भारतीय शास्त्रीय संगीत को वैश्विक पहचान दिलाई।", "1954 mein unhone Soviet Union mein pehla videshi pradarshan kiya aur iske baad Edinburgh Festival tatha Royal Festival Hall jaise pratishthit manchon par apni kala ka pradarshan kiya. 1960 ke dashak mein unhone videshi kalakaron ke saath milkar bhartiya shastriya sangeet ko vaishvik pehchaan dilayi.");
        b(c7, "वे 1986 से 1992 तक राज्यसभा के मनोनीत सदस्य रहे। 1999 में उन्हें भारत रत्न से सम्मानित किया गया और उन्हें कई अंतरराष्ट्रीय पुरस्कार, जिनमें ग्रैमी अवॉर्ड भी शामिल है, प्राप्त हुए। दिसंबर 2012 में उनका स्वर्गवास हुआ, किंतु उन्होंने पूर्व और पश्चिमी संगीत के बीच जो सेतु बनाया, वह अमर है।", "Ve 1986 se 1992 tak Rajya Sabha ke manoneet sadasya rahe. 1999 mein unhein Bharat Ratna se sammanit kiya gaya aur unhein kai antarrashtriya puraskar, jinmein Grammy Award bhi shamil hai, praapt hue. December 2012 mein unka swargvas hua, kintu unhone poorv aur pashchimi sangeet ke beech jo setu banaya, vah amar hai.");
        b(c7, "मदर टेरेसा मानवता, करुणा और सेवा की सजीव मिसाल थीं। उनका जन्म 26 अगस्त 1910 को स्कोप्जे में हुआ और उनका मूल नाम एग्नेस गोंझा बोजाक्षियू था। युवावस्था में ही उन्होंने नन बनने का निर्णय लिया और भारत आकर अपना जीवन गरीबों, बीमारों और बेसहारा लोगों की सेवा में समर्पित कर दिया।", "Mother Teresa manavata, karuna aur seva ki sajeev misaal theen. Unka janm 26 August 1910 ko Skopje mein hua aur unka mool naam Agnes Gonxha Bojaxhiu tha. Yuvavastha mein hi unhone nun banne ka nirnay liya aur bharat aakar apna jeevan gareebon, beemaron aur besahara logon ki seva mein samarpit kar diya.");
        b(c7, "1950 में उन्होंने \"मिशनरीज़ ऑफ़ चैरिटी\" की स्थापना की, जिसका उद्देश्य पीड़ित और असहाय लोगों की सेवा करना था। उनका जीवन त्याग और प्रेम से परिपूर्ण था। वे मानती थीं कि महानता बड़े कार्यों में नहीं, बल्कि छोटे कार्यों को बड़े प्रेम से करने में है।\n\n1979 में उन्हें नोबेल शांति पुरस्कार से सम्मानित किया गया। 5 सितंबर 1997 को उनका निधन हो गया, लेकिन उनका जीवन आज भी मानव सेवा का आदर्श बना हुआ है।", "1950 mein unhone \"Missionaries of Charity\" ki sthapna ki, jiska uddeshya peedit aur asahay logon ki seva karna tha. Unka jeevan tyaag aur prem se paripoorna tha. Ve maanti theen ki mahaanta bade karyon mein nahi, balki chhote karyon ko bade prem se karne mein hai.\n\n1979 mein unhein Nobel Shanti Puraskar se sammanit kiya gaya. 5 September 1997 ko unka nidhan ho gaya, lekin unka jeevan aaj bhi manav seva ka aadarsh bana hua hai.");
        b(c7, "बिल गेट्स आधुनिक कंप्यूटर युग के सबसे प्रभावशाली व्यक्तियों में गिने जाते हैं। उनका जन्म 28 अक्टूबर 1955 को अमेरिका के सिएटल शहर में हुआ। उन्होंने अपने मित्र पॉल एलन के साथ माइक्रोसॉफ्ट की स्थापना कर तकनीकी क्षेत्र में क्रांति ला दी।", "Bill Gates aadhunik computer yug ke sabse prabhavshali vyaktiyon mein gine jaate hain. Unka janm 28 October 1955 ko America ke Seattle shahar mein hua. Unhone apne mitra Paul Allen ke saath Microsoft ki sthapna kar takneeki kshetra mein kranti la di.");
        b(c7, "बिल गेट्स ने कंप्यूटर को आम लोगों तक पहुँचाने में महत्वपूर्ण भूमिका निभाई। अपार धन और सफलता प्राप्त करने के बाद भी उन्होंने समाज के प्रति अपनी जिम्मेदारी को नहीं भुलाया। उन्होंने अपनी पत्नी मेलिंडा के साथ मिलकर \"बिल एंड मेलिंडा गेट्स फाउंडेशन\" की स्थापना की, जो शिक्षा, स्वास्थ्य और गरीबी उन्मूलन के क्षेत्र में कार्य करता है। उनका जीवन यह सिखाता है कि सच्ची सफलता वही है, जो समाज के कल्याण में योगदान दे।", "Bill Gates ne computer ko aam logon tak pahunchane mein mahatvapurna bhoomika nibhayi. Apaar dhan aur safalta praapt karne ke baad bhi unhone samaj ke prati apni zimmedari ko nahi bhulaya. Unhone apni patni Melinda ke saath milkar \"Bill & Melinda Gates Foundation\" ki sthapna ki, jo shiksha, swasthya aur gareebi unmoolan ke kshetra mein karya karta hai. Unka jeevan yeh sikhata hai ki sachchi safalta wahi hai, jo samaj ke kalyan mein yogdaan de.");
        b(c7, "इन चारों महान विभूतियों के जीवन से यह स्पष्ट होता है कि महानता पद, धन या प्रसिद्धि से नहीं, बल्कि उद्देश्य, समर्पण और मानव कल्याण की भावना से जन्म लेती है। किसी ने खेल के मैदान में, किसी ने संगीत के सुरों में, किसी ने सेवा के मार्ग पर और किसी ने तकनीक के माध्यम से दुनिया को बेहतर बनाने का प्रयास किया। यही कारण है कि ये सभी व्यक्तित्व युगों-युगों तक महान विभूतियाँ कहलाते रहेंगे।", "In chaaron mahaan vibhutiyon ke jeevan se yeh spasht hota hai ki mahaanta pad, dhan ya prasiddhi se nahi, balki uddeshya, samarpan aur manav kalyan ki bhavana se janm leti hai. Kisi ne khel ke maidan mein, kisi ne sangeet ke suron mein, kisi ne seva ke maarg par aur kisi ne takneek ke madhyam se duniya ko behtar banane ka prayas kiya. Yahi karan hai ki ye sabhi vyaktitva yugon-yugon tak mahaan vibhutiyan kehlate rahenge.");


        // ==========================================
        // UI rendering logic
        // ==========================================
        const tabsBar = document.getElementById('tabsBar');
        const contentArea = document.getElementById('contentArea');
        const langToggle = document.getElementById('langToggle');
        const labelHi = document.getElementById('labelHi');
        const labelEn = document.getElementById('labelEn');

        function applyLanguageState(isHinglish) {
            if (isHinglish) {
                document.body.classList.remove('show-hi');
                document.body.classList.add('show-en');
                labelEn.classList.add('active-label');
                labelHi.classList.remove('active-label');
                langToggle.checked = true;
            } else {
                document.body.classList.remove('show-en');
                document.body.classList.add('show-hi');
                labelHi.classList.add('active-label');
                labelEn.classList.remove('active-label');
                langToggle.checked = false;
            }
        }

        function downloadPdfFor(lang) {
            const wasHinglish = langToggle.checked;
            const previousTitle = document.title;
            applyLanguageState(lang === 'en');
            document.title = lang === 'hi' ? 'Module 1 - Hindi' : 'Module 1 - Hinglish';
            window.print();
            document.title = previousTitle;
            applyLanguageState(wasHinglish);
        }

        // Toggle Language
        langToggle.addEventListener('change', (e) => {
            applyLanguageState(e.target.checked);
            highlightLineByProgress(false);
        });

        // Render Tabs
        function renderTabs() {
            tabsBar.innerHTML = '';
            db.forEach((chap, index) => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn';
                if (index === 0) btn.classList.add('active');
                
                // Show Hindi or English title depending on state
                btn.innerHTML = `<span class="lang-hi">${chap.titleHi}</span><span class="lang-en">${chap.titleEn}</span>`;
                
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderContent(chap, index);
                };
                tabsBar.appendChild(btn);
            });
        }

        // Render Content
        function renderContent(chap, chapterIndex) {
            contentArea.innerHTML = '';
            activeChapterIndex = chapterIndex;
            
            const titleEl = document.createElement('h1');
            titleEl.className = 'chapter-title';
            titleEl.innerHTML = `<span class="lang-hi">${chap.titleHi}</span><span class="lang-en">${chap.titleEn}</span>`;
            contentArea.appendChild(titleEl);

            chap.blocks.forEach(block => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="lang-hi">${wrapLines(block.hi)}</div>
                    <div class="lang-en">${wrapLines(block.en)}</div>
                `;
                contentArea.appendChild(card);
            });
            window.scrollTo(0, 0);
            setupChapterAudio(chapterIndex, chap.titleHi);
            resetLineHighlight();
        }

        function wrapLines(text) {
            const lines = text.split('\n');
            return lines.map((line, idx) => {
                if (line.trim() === '') {
                    return '<br>';
                }
                return `<span class="audio-line" data-line="${idx}">${line}</span><br>`;
            }).join('');
        }

        const chapterAudioMap = {
            0: 'narration/1.1 गिनीज बुक मेरे नगर की full.mp3',
            1: 'narration/1.2 वाणिज्य और विज्ञापन page 1.mp3',
            2: 'narration/1.2 वाणिज्य और विज्ञापन full.mp3',
            3: 'narration/1.3 युवा क्रांति के शोले full.mp3',
            4: 'narration/1.4 yatra japan ki full.mp3',
            5: null,
            6: 'narration/1.6 महान विभूतियां full.wav'
        };

        const chapterAudio = document.getElementById('chapterAudio');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const backwardBtn = document.getElementById('backwardBtn');
        const forwardBtn = document.getElementById('forwardBtn');
        const seekBar = document.getElementById('seekBar');
        const playerTime = document.getElementById('playerTime');
        const audioTitle = document.getElementById('audioTitle');
        const audioSubtitle = document.getElementById('audioSubtitle');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');

        function getVisibleLines() {
            const isHinglish = langToggle.checked;
            const visibleContainers = document.querySelectorAll(isHinglish ? '.lang-en' : '.lang-hi');
            const lines = [];
            visibleContainers.forEach(container => {
                const style = window.getComputedStyle(container);
                if (style.display !== 'none') {
                    lines.push(...container.querySelectorAll('.audio-line'));
                }
            });
            return lines;
        }

        function resetLineHighlight() {
            document.querySelectorAll('.audio-line.active').forEach((line) => line.classList.remove('active'));
        }

        function highlightLineByProgress(scrollToLine) {
            const lines = getVisibleLines();
            resetLineHighlight();

            if (!lines.length || !chapterAudio.duration || Number.isNaN(chapterAudio.duration)) {
                return;
            }

            const progress = chapterAudio.currentTime / chapterAudio.duration;
            const lineIndex = Math.max(0, Math.min(lines.length - 1, Math.floor(progress * lines.length)));
            const activeLine = lines[lineIndex];
            activeLine.classList.add('active');

            if (scrollToLine) {
                activeLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function updateTimeAndSeek() {
            const duration = chapterAudio.duration || 0;
            const current = chapterAudio.currentTime || 0;
            const progress = duration ? (current / duration) * 100 : 0;
            seekBar.value = progress;
            playerTime.textContent = `${formatTime(current)} / ${formatTime(duration)}`;
        }

        function formatTime(seconds) {
            const safe = Number.isFinite(seconds) ? Math.floor(seconds) : 0;
            const mm = String(Math.floor(safe / 60)).padStart(2, '0');
            const ss = String(safe % 60).padStart(2, '0');
            return `${mm}:${ss}`;
        }

        function setPlayerEnabled(enabled) {
            playPauseBtn.disabled = !enabled;
            backwardBtn.disabled = !enabled;
            forwardBtn.disabled = !enabled;
            seekBar.disabled = !enabled;
        }

        function setupChapterAudio(chapterIndex, chapterTitle) {
            const src = chapterAudioMap[chapterIndex] || null;

            chapterAudio.pause();
            chapterAudio.currentTime = 0;
            resetLineHighlight();
            seekBar.value = 0;
            playerTime.textContent = '00:00 / 00:00';
            playPauseBtn.textContent = 'Play';

            if (!src) {
                chapterAudio.removeAttribute('src');
                chapterAudio.load();
                setPlayerEnabled(false);
                audioTitle.textContent = `${chapterTitle}`;
                audioSubtitle.textContent = 'No narration added for this chapter yet.';
                return;
            }

            chapterAudio.src = encodeURI(src);
            chapterAudio.playbackRate = Number(speedSlider.value);
            setPlayerEnabled(true);
            audioTitle.textContent = `${chapterTitle}`;
            audioSubtitle.textContent = src;
        }

        playPauseBtn.addEventListener('click', async () => {
            if (!chapterAudio.getAttribute('src')) {
                return;
            }
            if (chapterAudio.paused) {
                await chapterAudio.play();
            } else {
                chapterAudio.pause();
            }
        });

        backwardBtn.addEventListener('click', () => {
            chapterAudio.currentTime = Math.max(0, chapterAudio.currentTime - 5);
            highlightLineByProgress(true);
        });

        forwardBtn.addEventListener('click', () => {
            const duration = chapterAudio.duration || 0;
            chapterAudio.currentTime = Math.min(duration, chapterAudio.currentTime + 5);
            highlightLineByProgress(true);
        });

        speedSlider.addEventListener('input', () => {
            const speed = Number(speedSlider.value);
            chapterAudio.playbackRate = speed;
            speedValue.textContent = `${speed % 1 === 0 ? speed.toFixed(0) : speed.toFixed(1)}x`;
        });

        seekBar.addEventListener('input', () => {
            if (!chapterAudio.duration || Number.isNaN(chapterAudio.duration)) {
                return;
            }
            chapterAudio.currentTime = (Number(seekBar.value) / 100) * chapterAudio.duration;
            highlightLineByProgress(false);
            updateTimeAndSeek();
        });

        chapterAudio.addEventListener('loadedmetadata', () => {
            updateTimeAndSeek();
            highlightLineByProgress(false);
        });

        chapterAudio.addEventListener('timeupdate', () => {
            updateTimeAndSeek();
            highlightLineByProgress(false);
        });

        chapterAudio.addEventListener('play', () => {
            playPauseBtn.textContent = 'Pause';
        });

        chapterAudio.addEventListener('pause', () => {
            playPauseBtn.textContent = 'Play';
        });

        chapterAudio.addEventListener('ended', () => {
            playPauseBtn.textContent = 'Play';
            highlightLineByProgress(true);
        });

        document.addEventListener('click', (e) => {
            if (!e.target.classList.contains('audio-line')) {
                return;
            }
            if (!chapterAudio.duration || Number.isNaN(chapterAudio.duration)) {
                return;
            }
            const lines = getVisibleLines();
            const index = lines.findIndex((line) => line === e.target);
            if (index === -1) {
                return;
            }
            const targetTime = (index / Math.max(1, lines.length)) * chapterAudio.duration;
            chapterAudio.currentTime = targetTime;
            highlightLineByProgress(true);
            updateTimeAndSeek();
        });

        // Initialize
        renderTabs();
        if (db.length > 0) {
            renderContent(db[0], 0);
        }
    </script>
</body>
</html>
